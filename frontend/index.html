<!DOCTYPE html>
<html>
<head>
    <title>Docker Compose Demo</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🐳 Docker Compose Demo</h1>
    <button onclick="callApi()">Call Flask API</button>
    <div id="result">Click the button to see response...</div>

    <script>
        async function callApi() {
            try {
                const response = await fetch('http://localhost:5000/api/message');
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<strong>API Response:</strong> ${JSON.stringify(data)}`;
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<strong>Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
